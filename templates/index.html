<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EggSort AI — Industrial Grading System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #0a0c10;
  --ink2:    #111318;
  --ink3:    #181c24;
  --ink4:    #1e2330;
  --wire:    rgba(255,255,255,0.06);
  --wire2:   rgba(255,255,255,0.11);
  --wire3:   rgba(255,255,255,0.18);
  --text:    #dde2ee;
  --dim:     #6b7394;
  --dimmer:  #3d4460;

  --aa-h:   #a3e635;  --aa-glow: rgba(163,230,53,0.18);   --aa-dim: rgba(163,230,53,0.08);
  --a-h:    #38bdf8;  --a-glow:  rgba(56,189,248,0.18);   --a-dim:  rgba(56,189,248,0.08);
  --b-h:    #fb923c;  --b-glow:  rgba(251,146,60,0.18);   --b-dim:  rgba(251,146,60,0.08);
  --c-h:    #f43f5e;  --c-glow:  rgba(244,63,94,0.18);    --c-dim:  rgba(244,63,94,0.08);

  --go:     #22c55e;  --go-glow: rgba(34,197,94,0.2);
  --stop:   #ef4444;
  --amber:  #f59e0b;
  --mono:   'JetBrains Mono', monospace;
  --sans:   'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--ink); color: var(--text); font-family: var(--sans); font-size: 13px; }

/* ── grid layout ─────────────────────────────────── */
.root { display: grid; height: 100vh; grid-template-rows: 44px 1fr; grid-template-columns: 1fr 300px; }
.topbar  { grid-column: 1 / -1; background: var(--ink2); border-bottom: 1px solid var(--wire2); display: flex; align-items: center; gap: 0; padding: 0; }
.center  { overflow: hidden; display: flex; flex-direction: column; }
.panel   { background: var(--ink2); border-left: 1px solid var(--wire2); overflow-y: auto; display: flex; flex-direction: column; gap: 0; }

/* ── topbar ──────────────────────────────────────── */
.tb-brand { padding: 0 18px; border-right: 1px solid var(--wire2); height: 100%; display: flex; align-items: center; gap: 10px; }
.tb-logo  { width: 24px; height: 24px; background: var(--aa-h); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #000; font-weight: 700; flex-shrink: 0; }
.tb-name  { font-size: 13px; font-weight: 600; letter-spacing: .02em; white-space: nowrap; }
.tb-sub   { font-size: 11px; color: var(--dim); font-family: var(--mono); }
.tb-mid   { flex: 1; display: flex; align-items: center; justify-content: center; gap: 32px; }
.tb-kpi   { text-align: center; }
.tb-kpi-v { font-family: var(--mono); font-size: 18px; font-weight: 600; line-height: 1; }
.tb-kpi-l { font-size: 10px; color: var(--dim); margin-top: 2px; text-transform: uppercase; letter-spacing: .06em; }
.tb-sep   { width: 1px; height: 24px; background: var(--wire2); }
.tb-right { padding: 0 16px; border-left: 1px solid var(--wire2); height: 100%; display: flex; align-items: center; gap: 10px; }
.pulse    { width: 8px; height: 8px; border-radius: 50%; background: var(--dimmer); flex-shrink: 0; transition: background .3s; }
.pulse.live { background: var(--go); box-shadow: 0 0 0 3px var(--go-glow); animation: heartbeat 2s ease-in-out infinite; }
.pulse.err  { background: var(--stop); }
@keyframes heartbeat { 0%,100% { box-shadow: 0 0 0 2px var(--go-glow); } 50% { box-shadow: 0 0 0 5px transparent; } }
.ws-label { font-size: 11px; color: var(--dim); font-family: var(--mono); }

/* ── camera ──────────────────────────────────────── */
.cam-area { flex: 1; position: relative; background: #000; overflow: hidden; min-height: 0; }
.cam-img  { width: 100%; height: 100%; object-fit: contain; display: block; opacity: 0; transition: opacity .4s; }
.cam-img.visible { opacity: 1; }
.cam-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--dimmer); }
.cam-empty svg { opacity: .4; }
.cam-empty p { font-family: var(--mono); font-size: 12px; }
/* scan overlay */
.scan-beam { position: absolute; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, var(--aa-h) 40%, var(--aa-h) 60%, transparent 100%); opacity: 0; pointer-events: none; transition: opacity .4s; }
.scan-beam.active { opacity: .7; animation: beam 2s linear infinite; }
@keyframes beam { from { top: 0; } to { top: 100%; } }
/* corner brackets */
.cam-area::before, .cam-area::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--aa-h); border-style: solid; opacity: 0; transition: opacity .4s; z-index: 2; pointer-events: none; }
.cam-area::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
.cam-area::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }
.cam-area.live::before, .cam-area.live::after { opacity: 1; }
/* grade stamp */
.grade-stamp { position: absolute; top: 12px; right: 12px; z-index: 3; }
.grade-pill { padding: 6px 14px; border-radius: 4px; font-family: var(--mono); font-size: 22px; font-weight: 600; letter-spacing: .06em; backdrop-filter: blur(4px); border: 1px solid; transition: all .3s; }
.grade-pill.AA { background: var(--aa-dim); color: var(--aa-h); border-color: rgba(163,230,53,.3); }
.grade-pill.A  { background: var(--a-dim);  color: var(--a-h);  border-color: rgba(56,189,248,.3); }
.grade-pill.B  { background: var(--b-dim);  color: var(--b-h);  border-color: rgba(251,146,60,.3); }
.grade-pill.C  { background: var(--c-dim);  color: var(--c-h);  border-color: rgba(244,63,94,.3); }
/* weight overlay */
.weight-tag { position: absolute; bottom: 12px; left: 12px; font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,.7); background: rgba(0,0,0,.55); backdrop-filter: blur(4px); padding: 4px 10px; border-radius: 3px; z-index: 3; }
/* confidence bar */
.conf-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,.05); z-index: 3; }
.conf-bar { height: 100%; background: var(--aa-h); transition: width .5s ease, background .3s; }

/* ── bottom strip: conveyor ──────────────────────── */
.conveyor-strip { height: 64px; background: var(--ink3); border-top: 1px solid var(--wire2); display: flex; align-items: center; gap: 0; overflow: hidden; flex-shrink: 0; padding: 0 12px; position: relative; }
.conv-label { font-size: 10px; color: var(--dimmer); text-transform: uppercase; letter-spacing: .08em; font-family: var(--mono); writing-mode: horizontal-tb; white-space: nowrap; margin-right: 12px; flex-shrink: 0; }
.belt { flex: 1; display: flex; align-items: center; gap: 6px; overflow: hidden; height: 100%; position: relative; }
.belt::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 32px; background: linear-gradient(90deg, var(--ink3), transparent); z-index: 1; pointer-events: none; }
.belt::after  { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 32px; background: linear-gradient(-90deg, var(--ink3), transparent); z-index: 1; pointer-events: none; }
.egg-token { flex-shrink: 0; width: 36px; height: 40px; border-radius: 50% 50% 48% 52% / 58% 58% 42% 42%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 600; border: 1px solid; animation: roll .35s ease-out; }
.egg-token.AA { background: var(--aa-dim); color: var(--aa-h); border-color: rgba(163,230,53,.25); }
.egg-token.A  { background: var(--a-dim);  color: var(--a-h);  border-color: rgba(56,189,248,.25); }
.egg-token.B  { background: var(--b-dim);  color: var(--b-h);  border-color: rgba(251,146,60,.25); }
.egg-token.C  { background: var(--c-dim);  color: var(--c-h);  border-color: rgba(244,63,94,.25); }
@keyframes roll { from { transform: translateX(80px) scale(.7); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }

/* ── right panel ─────────────────────────────────── */
.sec { border-bottom: 1px solid var(--wire); padding: 14px 16px; }
.sec-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--dimmer); margin-bottom: 12px; font-family: var(--mono); }

/* controls */
.ctrl-cam { display: flex; gap: 6px; margin-bottom: 10px; }
select { flex: 1; background: var(--ink3); border: 1px solid var(--wire2); border-radius: 4px; color: var(--text); padding: 6px 8px; font-size: 12px; font-family: var(--mono); outline: none; }
select:focus { border-color: var(--wire3); }
.icon-btn { width: 30px; height: 30px; background: var(--ink3); border: 1px solid var(--wire2); border-radius: 4px; color: var(--dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: all .12s; }
.icon-btn:hover { background: var(--ink4); color: var(--text); border-color: var(--wire3); }
.interval-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.interval-row label { font-size: 11px; color: var(--dim); white-space: nowrap; }
input[type=range] { flex: 1; accent-color: var(--aa-h); height: 2px; cursor: pointer; }
.interval-val { font-family: var(--mono); font-size: 11px; color: var(--text); min-width: 30px; text-align: right; }
.btn-row { display: flex; gap: 6px; }
.btn { flex: 1; padding: 9px 0; border-radius: 4px; font-size: 12px; font-weight: 600; letter-spacing: .04em; cursor: pointer; border: 1px solid; transition: all .12s; font-family: var(--sans); }
.btn:disabled { opacity: .3; cursor: not-allowed; }
.btn:active:not(:disabled) { transform: scale(.97); }
.btn-go   { background: rgba(34,197,94,.1);  border-color: rgba(34,197,94,.3);  color: var(--go); }
.btn-go:hover:not(:disabled)   { background: rgba(34,197,94,.18); }
.btn-halt { background: rgba(239,68,68,.1);  border-color: rgba(239,68,68,.3);  color: var(--stop); }
.btn-halt:hover:not(:disabled) { background: rgba(239,68,68,.18); }
.btn-reset { background: var(--ink3); border-color: var(--wire2); color: var(--dim); flex: 0 0 auto; padding: 9px 12px; }
.btn-reset:hover { color: var(--text); border-color: var(--wire3); }

/* grade bars */
.grade-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.grade-lbl { font-family: var(--mono); font-size: 12px; font-weight: 600; width: 22px; }
.grade-lbl.AA { color: var(--aa-h); } .grade-lbl.A { color: var(--a-h); }
.grade-lbl.B  { color: var(--b-h); } .grade-lbl.C { color: var(--c-h); }
.grade-track { flex: 1; height: 6px; background: var(--wire); border-radius: 100px; overflow: hidden; }
.grade-fill  { height: 100%; border-radius: 100px; transition: width .6s cubic-bezier(.16,1,.3,1); }
.fill-AA { background: var(--aa-h); } .fill-A { background: var(--a-h); }
.fill-B  { background: var(--b-h); } .fill-C { background: var(--c-h); }
.grade-n { font-family: var(--mono); font-size: 11px; color: var(--dim); width: 22px; text-align: right; }

/* last result detail */
.result-big { text-align: center; padding: 12px 0 8px; }
.result-glyph { font-family: var(--mono); font-size: 52px; font-weight: 600; line-height: 1; }
.result-glyph.AA { color: var(--aa-h); text-shadow: 0 0 24px var(--aa-glow); }
.result-glyph.A  { color: var(--a-h);  text-shadow: 0 0 24px var(--a-glow); }
.result-glyph.B  { color: var(--b-h);  text-shadow: 0 0 24px var(--b-glow); }
.result-glyph.C  { color: var(--c-h);  text-shadow: 0 0 24px var(--c-glow); }
.result-weight { font-family: var(--mono); font-size: 14px; color: var(--dim); margin-top: 2px; }
.result-chips { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
.chip { padding: 3px 8px; border-radius: 3px; font-size: 11px; font-family: var(--mono); border: 1px solid var(--wire2); background: var(--ink3); color: var(--dim); }
.chip.pass   { background: rgba(34,197,94,.08);  border-color: rgba(34,197,94,.2);  color: var(--go); }
.chip.check  { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.2); color: var(--amber); }
.chip.reject { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.2);  color: var(--stop); }

/* log */
.log-scroll { max-height: 220px; overflow-y: auto; }
.log-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--wire); font-family: var(--mono); font-size: 11px; }
.log-row:last-child { border-bottom: none; }
.log-id   { color: var(--dimmer); width: 28px; }
.log-time { color: var(--dimmer); }
.log-g    { font-weight: 600; width: 20px; }
.log-g.AA { color: var(--aa-h); } .log-g.A { color: var(--a-h); }
.log-g.B  { color: var(--b-h); } .log-g.C { color: var(--c-h); }
.log-w    { color: var(--dim); margin-left: auto; }
.log-rec  { padding: 1px 5px; border-radius: 2px; font-size: 10px; }
.log-rec.pass   { background: rgba(34,197,94,.12);  color: var(--go); }
.log-rec.check  { background: rgba(245,158,11,.12); color: var(--amber); }
.log-rec.reject { background: rgba(239,68,68,.12);  color: var(--stop); }

/* clock */
.session-clock { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text); text-align: center; letter-spacing: .1em; padding: 6px 0 2px; }
.session-sub   { font-size: 10px; color: var(--dimmer); text-align: center; font-family: var(--mono); padding-bottom: 4px; }
.export-btn { display: block; margin: 10px 0 0; padding: 8px 0; text-align: center; border-radius: 4px; font-size: 11px; font-family: var(--mono); color: var(--dim); background: var(--ink3); border: 1px solid var(--wire2); cursor: pointer; text-decoration: none; transition: all .12s; }
.export-btn:hover { color: var(--text); border-color: var(--wire3); }

/* toast */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--ink4); border: 1px solid var(--wire3); border-radius: 6px; padding: 8px 16px; font-size: 12px; font-family: var(--mono); opacity: 0; transition: all .2s; pointer-events: none; white-space: nowrap; z-index: 999; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--wire2); border-radius: 100px; }
</style>
</head>
<body>
<div class="root">

  <!-- ── TOPBAR ─────────────────────────────────────── -->
  <header class="topbar">
    <div class="tb-brand">
      <div class="tb-logo">E</div>
      <div>
        <div class="tb-name">EggSort AI</div>
        <div class="tb-sub">CR5M03 · USB 5MP</div>
      </div>
    </div>

    <div class="tb-mid">
      <div class="tb-kpi">
        <div class="tb-kpi-v" id="kpi-total">0</div>
        <div class="tb-kpi-l">Total</div>
      </div>
      <div class="tb-sep"></div>
      <div class="tb-kpi">
        <div class="tb-kpi-v" id="kpi-aa" style="color:var(--aa-h)">0</div>
        <div class="tb-kpi-l">AA</div>
      </div>
      <div class="tb-kpi">
        <div class="tb-kpi-v" id="kpi-a" style="color:var(--a-h)">0</div>
        <div class="tb-kpi-l">A</div>
      </div>
      <div class="tb-kpi">
        <div class="tb-kpi-v" id="kpi-b" style="color:var(--b-h)">0</div>
        <div class="tb-kpi-l">B</div>
      </div>
      <div class="tb-kpi">
        <div class="tb-kpi-v" id="kpi-c" style="color:var(--c-h)">0</div>
        <div class="tb-kpi-l">C</div>
      </div>
      <div class="tb-sep"></div>
      <div class="tb-kpi">
        <div class="tb-kpi-v" id="kpi-rate" style="color:var(--go)">—</div>
        <div class="tb-kpi-l">Pass %</div>
      </div>
    </div>

    <a href="/history" style="padding:0 14px;border-left:1px solid var(--wire2);height:100%;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--dim);text-decoration:none;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--dim)'">&#9776; ประวัติ &amp; Analytics</a>
  <div class="tb-right">
      <div class="pulse" id="ws-pulse"></div>
      <span class="ws-label" id="ws-label">connecting…</span>
    </div>
  </header>

  <!-- ── CENTER: CAMERA + BELT ──────────────────────── -->
  <main class="center">
    <div class="cam-area" id="cam-area">
      <div class="cam-empty" id="cam-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p id="cam-status-text">กด "เริ่ม" เพื่อเปิดกล้อง</p>
      </div>
      <img id="cam-img" class="cam-img" alt="live feed" />
      <div class="scan-beam" id="scan-beam"></div>

      <div class="grade-stamp" id="grade-stamp" style="display:none">
        <div class="grade-pill" id="grade-pill">—</div>
      </div>
      <div class="weight-tag" id="weight-tag" style="display:none">— g</div>
      <div class="conf-bar-wrap"><div class="conf-bar" id="conf-bar" style="width:0%"></div></div>
    </div>

    <!-- conveyor belt strip -->
    <div class="conveyor-strip">
      <div class="conv-label">สายพาน</div>
      <div class="belt" id="belt">
        <span style="font-family:var(--mono);font-size:11px;color:var(--dimmer);padding-left:16px;">รอไข่…</span>
      </div>
    </div>
  </main>

  <!-- ── RIGHT PANEL ────────────────────────────────── -->
  <aside class="panel">

    <!-- session clock -->
    <div class="sec">
      <div class="session-clock" id="session-clock">00:00:00</div>
      <div class="session-sub">เวลาทำงานเซสชัน</div>
    </div>

    <!-- controls -->
    <div class="sec">
      <div class="sec-label">กล้อง</div>
      <div class="ctrl-cam">
        <select id="cam-select"><option value="0">Camera 0 (default)</option></select>
        <button class="icon-btn" onclick="scanCameras()" title="สแกนหากล้อง">⟳</button>
      </div>
      <div class="interval-row">
        <label>ช่วงสแกน</label>
        <input type="range" id="iv-slider" min="0.5" max="10" step="0.5" value="2" oninput="setIv(this.value)">
        <span class="interval-val" id="iv-val">2.0s</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-go"   id="btn-go"   onclick="startSystem()">▶ เริ่ม</button>
        <button class="btn btn-halt" id="btn-halt" onclick="stopSystem()" disabled>■ หยุด</button>
        <button class="btn btn-reset" onclick="resetStats()">↺</button>
      </div>
    </div>

    <!-- last result -->
    <div class="sec">
      <div class="sec-label">ผลล่าสุด</div>
      <div class="result-big" id="result-big">
        <div class="result-glyph" id="r-grade" style="color:var(--dimmer)">—</div>
        <div class="result-weight" id="r-weight">รอวิเคราะห์</div>
        <div class="result-chips" id="r-chips"></div>
      </div>
    </div>

    <!-- grade distribution -->
    <div class="sec">
      <div class="sec-label">การกระจาย</div>
      <div class="grade-row"><span class="grade-lbl AA">AA</span><div class="grade-track"><div class="grade-fill fill-AA" id="bar-AA" style="width:0%"></div></div><span class="grade-n" id="n-AA">0</span></div>
      <div class="grade-row"><span class="grade-lbl A">A</span><div class="grade-track"><div class="grade-fill fill-A"  id="bar-A"  style="width:0%"></div></div><span class="grade-n" id="n-A">0</span></div>
      <div class="grade-row"><span class="grade-lbl B">B</span><div class="grade-track"><div class="grade-fill fill-B"  id="bar-B"  style="width:0%"></div></div><span class="grade-n" id="n-B">0</span></div>
      <div class="grade-row"><span class="grade-lbl C">C</span><div class="grade-track"><div class="grade-fill fill-C"  id="bar-C"  style="width:0%"></div></div><span class="grade-n" id="n-C">0</span></div>
    </div>

    <!-- log -->
    <div class="sec" style="flex:1; min-height:0; display:flex; flex-direction:column;">
      <div class="sec-label">ประวัติ</div>
      <div class="log-scroll" id="log-scroll">
        <div style="font-family:var(--mono);font-size:11px;color:var(--dimmer);padding:8px 0;">ยังไม่มีข้อมูล</div>
      </div>
      <a href="/export" class="export-btn" download>⬇ ดาวน์โหลด CSV</a>
    </div>

  </aside>
</div>
<div id="toast"></div>

<script>
const WS = `ws://${location.hostname}:8765`;
let ws, reconnTimer, sessTimer, sessStart;
const C = { AA:0, A:0, B:0, C:0 };
let total = 0;

/* ── WebSocket ─────────────────────────────────── */
function connect() {
  ws = new WebSocket(WS);
  ws.onopen  = () => { setWs(true); clearTimeout(reconnTimer); };
  ws.onclose = () => { setWs(false); reconnTimer = setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => handle(JSON.parse(e.data));
}
function send(o) { if (ws?.readyState === 1) ws.send(JSON.stringify(o)); }

function handle(m) {
  if (m.type === 'init') {
    applyStatus(m); applyStats(m);
    m.history?.slice(0,80).forEach(addLog);
    if (m.cameras) fillCams(m.cameras);
  }
  else if (m.type === 'frame')  showFrame(m.data);
  else if (m.type === 'result') { showResult(m.entry); addBelt(m.entry.grade); addLog(m.entry); applyStats(m); }
  else if (m.type === 'status') applyStatus(m);
  else if (m.type === 'reset')  doReset();
  else if (m.type === 'cameras') fillCams(m.cameras);
  else if (m.type === 'error')  toast('⚠ ' + m.message);
}

/* ── Status / WebSocket ────────────────────────── */
function setWs(ok) {
  document.getElementById('ws-pulse').className = 'pulse ' + (ok ? 'live' : 'err');
  document.getElementById('ws-label').textContent = ok ? 'connected' : 'reconnecting…';
}

function applyStatus(m) {
  const on = m.running;
  document.getElementById('btn-go').disabled   = on;
  document.getElementById('btn-halt').disabled = !on;
  document.getElementById('scan-beam').className = 'scan-beam' + (on ? ' active' : '');
  document.getElementById('cam-area').classList.toggle('live', on);
  document.getElementById('cam-status-text').textContent = on ? 'รอภาพจากกล้อง…' : 'กด "เริ่ม" เพื่อเปิดกล้อง';
  if (on && !sessTimer) {
    sessStart = Date.now();
    sessTimer = setInterval(tickClock, 1000);
  }
  if (!on && sessTimer) { clearInterval(sessTimer); sessTimer = null; }
}

function tickClock() {
  const s = Math.floor((Date.now() - sessStart) / 1000);
  const h = String(Math.floor(s/3600)).padStart(2,'0');
  const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  document.getElementById('session-clock').textContent = `${h}:${m}:${sec}`;
}

/* ── Camera frame ──────────────────────────────── */
function showFrame(b64) {
  const img = document.getElementById('cam-img');
  img.src = 'data:image/jpeg;base64,' + b64;
  img.classList.add('visible');
  document.getElementById('cam-empty').style.display = 'none';
}

/* ── Result ────────────────────────────────────── */
const gcol = { AA:'var(--aa-h)', A:'var(--a-h)', B:'var(--b-h)', C:'var(--c-h)' };
const recCls = { 'ผ่าน':'pass', 'ตรวจสอบ':'check', 'ปฏิเสธ':'reject' };

function showResult(r) {
  const g = r.grade;
  const el = document.getElementById('r-grade');
  el.textContent = g;
  el.className = 'result-glyph ' + g;
  document.getElementById('r-weight').textContent = r.estimatedWeight || '— g';

  const chips = document.getElementById('r-chips');
  chips.innerHTML = '';
  const add = (txt, cls) => { const c = document.createElement('span'); c.className = 'chip' + (cls ? ' '+cls : ''); c.textContent = txt; chips.appendChild(c); };
  add(r.confidence + '%');
  add(r.shellCondition || '—');
  add(r.color || '—');
  if (r.recommendation) add(r.recommendation, recCls[r.recommendation] || '');

  const stamp = document.getElementById('grade-stamp');
  const pill  = document.getElementById('grade-pill');
  pill.textContent = g;
  pill.className = 'grade-pill ' + g;
  stamp.style.display = 'block';

  document.getElementById('weight-tag').textContent = r.estimatedWeight || '—';
  document.getElementById('weight-tag').style.display = 'block';

  const conf = r.confidence || 0;
  const bar  = document.getElementById('conf-bar');
  bar.style.width = conf + '%';
  bar.style.background = conf >= 80 ? 'var(--aa-h)' : conf >= 60 ? 'var(--b-h)' : 'var(--c-h)';
}

/* ── Belt ──────────────────────────────────────── */
function addBelt(g) {
  const belt = document.getElementById('belt');
  const ph = belt.querySelector('span');
  if (ph) ph.remove();
  const el = document.createElement('div');
  el.className = 'egg-token ' + g;
  el.textContent = g;
  belt.appendChild(el);
  if (belt.children.length > 28) belt.removeChild(belt.firstChild);
  belt.scrollLeft = belt.scrollWidth;
}

/* ── Stats ─────────────────────────────────────── */
function applyStats(m) {
  const cn = m.counts || {};
  total = m.total || 0;
  const pass = m.pass || 0;
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-aa').textContent = cn.AA || 0;
  document.getElementById('kpi-a').textContent  = cn.A  || 0;
  document.getElementById('kpi-b').textContent  = cn.B  || 0;
  document.getElementById('kpi-c').textContent  = cn.C  || 0;
  document.getElementById('kpi-rate').textContent = total > 0 ? Math.round(pass/total*100)+'%' : '—';
  ['AA','A','B','C'].forEach(g => {
    document.getElementById('n-'+g).textContent = cn[g] || 0;
    document.getElementById('bar-'+g).style.width = total > 0 ? Math.round((cn[g]||0)/total*100)+'%' : '0%';
  });
}

/* ── Log ────────────────────────────────────────── */
function addLog(r) {
  const wrap = document.getElementById('log-scroll');
  const ph = wrap.querySelector('div');
  if (ph && ph.style.fontFamily) wrap.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'log-row';
  const rc = recCls[r.recommendation] || '';
  row.innerHTML = `<span class="log-id">#${String(r.id).padStart(3,'0')}</span><span class="log-time">${r.time}</span><span class="log-g ${r.grade}">${r.grade}</span><span class="log-w">${r.estimatedWeight||'—'}</span><span class="log-rec ${rc}">${r.recommendation||'—'}</span>`;
  wrap.insertBefore(row, wrap.firstChild);
  while (wrap.children.length > 80) wrap.removeChild(wrap.lastChild);
}

/* ── Reset ──────────────────────────────────────── */
function doReset() {
  total = 0;
  ['total','aa','a','b','c'].forEach(k => document.getElementById('kpi-'+k).textContent = k === 'rate' ? '—' : '0');
  document.getElementById('kpi-rate').textContent = '—';
  ['AA','A','B','C'].forEach(g => { document.getElementById('n-'+g).textContent = '0'; document.getElementById('bar-'+g).style.width = '0%'; });
  document.getElementById('belt').innerHTML = '<span style="font-family:var(--mono);font-size:11px;color:var(--dimmer);padding-left:16px;">รอไข่…</span>';
  document.getElementById('log-scroll').innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--dimmer);padding:8px 0;">ยังไม่มีข้อมูล</div>';
  document.getElementById('r-grade').textContent = '—';
  document.getElementById('r-grade').className = 'result-glyph';
  document.getElementById('r-grade').style.color = 'var(--dimmer)';
  document.getElementById('r-weight').textContent = 'รอวิเคราะห์';
  document.getElementById('r-chips').innerHTML = '';
  document.getElementById('grade-stamp').style.display = 'none';
  document.getElementById('weight-tag').style.display = 'none';
  document.getElementById('conf-bar').style.width = '0%';
  document.getElementById('session-clock').textContent = '00:00:00';
  toast('รีเซ็ตแล้ว');
}

/* ── Controls ───────────────────────────────────── */
function startSystem() { send({ cmd:'start', cameraIndex: parseInt(document.getElementById('cam-select').value) }); }
function stopSystem()  { send({ cmd:'stop' }); }
function resetStats()  { send({ cmd:'reset' }); }
function scanCameras() { send({ cmd:'scan_cameras' }); toast('กำลังสแกนกล้อง…'); }
function setIv(v) {
  document.getElementById('iv-val').textContent = parseFloat(v).toFixed(1)+'s';
  send({ cmd:'set_interval', value: parseFloat(v) });
}
function fillCams(cams) {
  const sel = document.getElementById('cam-select');
  sel.innerHTML = cams.length ? cams.map(i => `<option value="${i}">Camera ${i}${i===0?' (default)':''}</option>`).join('') : '<option value="0">ไม่พบกล้อง</option>';
  toast('พบกล้อง ' + cams.length + ' ตัว');
}

/* ── Toast ──────────────────────────────────────── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

connect();
</script>
</body>
</html>
